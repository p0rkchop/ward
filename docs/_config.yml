title: Ward Documentation
description: User documentation for the Ward appointment scheduling platform
url: "https://p0rkchop.github.io"
baseurl: "/ward"

remote_theme: just-the-docs/just-the-docs

color_scheme: dark

permalink: pretty

aux_links:
  "Ward on GitHub":
    - "https://github.com/p0rkchop/ward"

nav_external_links:
  - title: Ward on GitHub
    url: https://github.com/p0rkchop/ward

heading_anchors: true

search_enabled: true
search.heading_level: 3

back_to_top: true
back_to_top_text: "Back to top"

footer_content: "Ward &copy; 2026. Distributed under the MIT License."

exclude:
  - node_modules/
  - .next/
  - prisma/
  - app/
  - public/
  - "*.ts"
  - "*.tsx"
  - "*.mjs"
  - package.json
  - tsconfig.json
  - vitest.config.ts
